info:
  name: List Users
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUri}}/api/v1/user"
  auth:
    type: bearer
    token: "{{Token}}"

runtime:
  variables:
    - name: baseUri
      value: http://localhost:8080

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
