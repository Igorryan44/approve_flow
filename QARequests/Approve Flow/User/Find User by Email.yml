info:
  name: Find User by Email
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUri}}/api/v1/user/email?value=teste@teste.com"
  params:
    - name: value
      value: teste@teste.com
      type: query
  auth:
    type: bearer
    token: "{{Token}}"

runtime:
  variables:
    - name: baseUri
      value: http://localhost:8080

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
