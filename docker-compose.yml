services:

  approve_flow_db:
    image: postgres:17
    restart: always
    ports:
      - "4532:4532"
    shm_size: 128mb
    env_file:
      - ".env"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  approve_flow_app:
    build: ./
    ports:
      - "8080:8080"
    depends_on:
      - approve_flow_db

volumes:
  postgres_data: