services:

  db:
    image: postgres:17
    container_name: postgres_approve
    restart: always
    ports:
      - "4532:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    shm_size: 128mb
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./
    container_name: approve_flow
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - maven_cache:/root/.m2
    depends_on:
      db:
        condition: service_healthy


volumes:
  postgres_data:
  maven_cache: